<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JAI CLUB</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      background:#eef2ff;
      display:flex;
      justify-content:center;
      padding:30px 15px;
    }

    .card{
      width:430px;
      background:#fff;
      border-radius:28px;
      overflow:hidden;
      box-shadow:0 10px 30px rgba(0,0,0,0.08);
    }

    .top{
      background:linear-gradient(180deg,#edf2ff,#f6f8ff);
      padding:20px 22px 35px;
      position:relative;
    }

    .top-bar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:30px;
    }

    .brand{
      color:#2450d3;
      font-size:14px;
      font-weight:700;
      letter-spacing:3px;
    }

    .live{
      border:1px solid #9bd6ff;
      color:#2a87d9;
      padding:7px 18px;
      border-radius:30px;
      font-size:12px;
      font-weight:600;
      background:#f4fbff;
    }

    .live::before{
      content:"●";
      color:#3fb5ff;
      margin-right:6px;
    }

    .logo-wrap{
      display:flex;
      justify-content:center;
      margin-bottom:22px;
    }

    .logo{
      width:105px;
      height:105px;
      border-radius:50%;
      border:3px solid #2972ff;
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      box-shadow:0 10px 25px rgba(41,114,255,.25);
    }

    .logo img{
      width:85%;
      height:85%;
      object-fit:contain;
    }

    h1{
      text-align:center;
      font-size:52px;
      line-height:1;
      margin-bottom:10px;
      font-weight:700;
      background:linear-gradient(90deg,#162c7d,#3f82ff,#4bb6ff);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .subtitle{
      text-align:center;
      color:#7c879f;
      font-size:18px;
      margin-bottom:22px;
    }

    .badges{
      display:flex;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
    }

    .badge{
      background:#edf3ff;
      color:#2d57d5;
      padding:10px 18px;
      border-radius:30px;
      font-size:13px;
      font-weight:600;
    }

    .badge:nth-child(2){
      background:#eefcff;
      color:#0f7fc5;
    }

    .badge:nth-child(3){
      background:#f6f7fb;
      color:#2c3d67;
    }

    .members{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:18px 24px;
      border-top:1px solid #e6ebff;
      border-bottom:1px solid #e6ebff;
    }

    .members span{
      color:#6f7b95;
      font-size:15px;
    }

    .members span::before{
      content:"●";
      color:#4fc3ff;
      margin-right:8px;
    }

    .members h2{
      color:#2442b6;
      font-size:38px;
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      border-bottom:1px solid #e6ebff;
    }

    .stat{
      text-align:center;
      padding:25px 10px;
      border-right:1px solid #e6ebff;
    }

    .stat:last-child{
      border-right:none;
    }

    .stat h3{
      font-size:44px;
      color:#2245bb;
      line-height:1;
    }

    .stat h3 small{
      font-size:20px;
    }

    .stat p{
      margin-top:8px;
      color:#66748d;
      letter-spacing:2px;
      font-size:13px;
      font-weight:600;
    }

    .join-wrap{
      padding:30px 24px 20px;
      text-align:center;
    }

    .join-btn{
      width:100%;
      border:none;
      border-radius:24px;
      padding:18px 22px;
      background:linear-gradient(90deg,#1f9be0,#2478d5);
      display:flex;
      align-items:center;
      justify-content:space-between;
      color:#fff;
      cursor:pointer;
      box-shadow:0 15px 25px rgba(36,120,213,.25);
      transition:.3s;
    }

    .join-btn:hover{
      transform:translateY(-3px);
    }

    .btn-left{
      display:flex;
      align-items:center;
      gap:15px;
    }

    .telegram{
      width:55px;
      height:55px;
      border-radius:18px;
      background:rgba(255,255,255,.18);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:28px;
    }

    .btn-text h4{
      font-size:25px;
      text-align:left;
      line-height:1.2;
    }

    .btn-text p{
      font-size:13px;
      opacity:.9;
      text-align:left;
    }

    .arrow{
      font-size:32px;
      font-weight:300;
    }

    .join-note{
      margin-top:18px;
      color:#6d7a92;
      font-size:14px;
      position:relative;
    }

    .join-note::before,
    .join-note::after{
      content:"";
      position:absolute;
      top:50%;
      width:90px;
      height:1px;
      background:#dbe3ff;
    }

    .join-note::before{
      left:0;
    }

    .join-note::after{
      right:0;
    }

    .features{
      display:grid;
      grid-template-columns:1fr 1fr;
      border-top:1px solid #e6ebff;
    }

    .feature{
      padding:28px 20px;
      border-right:1px solid #e6ebff;
    }

    .feature:last-child{
      border-right:none;
    }

    .icon{
      width:42px;
      height:42px;
      border-radius:12px;
      background:#eef7ff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:22px;
      margin-bottom:14px;
    }

    .feature h5{
      color:#1d2f73;
      font-size:22px;
      margin-bottom:5px;
    }

    .feature p{
      color:#7b879e;
      font-size:14px;
    }

    @media(max-width:480px){
      .card{
        width:100%;
      }

      h1{
        font-size:42px;
      }

      .members h2{
        font-size:30px;
      }

      .btn-text h4{
        font-size:20px;
      }
    }
  </style>
</head>

<body>

  <div class="card">

    <div class="top">

      <div class="top-bar">
        <div class="brand">JAI CLUB</div>
        <div class="live">LIVE CHANNEL</div>
      </div>

      <div class="logo-wrap">
        <div class="logo">
          <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" alt="">
        </div>
      </div>

      <h1>JAI CLUB</h1>

      <div class="subtitle">
        Premium Match Analysis Platform
      </div>

      <div class="badges">
        <div class="badge">VERIFIED CHANNEL</div>
        <div class="badge">ELITE ANALYST</div>
        <div class="badge">VIP ACCESS</div>
      </div>

    </div>

    <div class="members">
      <span>Active Members</span>
      <h2>5,00,041</h2>
    </div>

    <div class="stats">

      <div class="stat">
        <h3>25<small>K+</small></h3>
        <p>DAILY TIPS</p>
      </div>

      <div class="stat">
        <h3>99<small>%</small></h3>
        <p>ACCURACY</p>
      </div>

      <div class="stat">
        <h3>4.9<small>★</small></h3>
        <p>RATING</p>
      </div>

    </div>

    <div class="join-wrap">

      <button class="join-btn"
        onclick="window.location.href='https://t.me/+98m0qu8KX-44ZDdl'">

        <div class="btn-left">

          <div class="telegram">✈</div>

          <div class="btn-text">
            <h4>Join Telegram Channel</h4>
            <p>Free • Instant access • No spam ever</p>
          </div>

        </div>

        <div class="arrow">→</div>

      </button>

      <div class="join-note">
        Join 500,000+ members today
      </div>

    </div>

    <div class="features">

      <div class="feature">
        <div class="icon">🔐</div>
        <h5>100% Secure</h5>
        <p>Encrypted & trusted platform</p>
      </div>

      <div class="feature">
        <div class="icon">⚡</div>
        <h5>24/7 Support</h5>
        <p>Always here to help you</p>
      </div>

    </div>

  </div>

</body>
</html>
