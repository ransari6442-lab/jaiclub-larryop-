<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JAI CLUB</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#eef2ff;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:12px;
}

.card{
  width:100%;
  max-width:340px;
  background:#fff;
  border-radius:24px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.top{
  padding:18px;
  background:linear-gradient(180deg,#edf2ff,#f8fbff);
  text-align:center;
}

.brand{
  color:#2450d3;
  font-size:12px;
  font-weight:700;
  letter-spacing:2px;
  margin-bottom:12px;
}

.logo{
  width:80px;
  height:80px;
  margin:auto;
  border-radius:50%;
  background:#fff;
  border:3px solid #2d7cff;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  box-shadow:0 8px 18px rgba(41,114,255,.2);
}

.logo img{
  width:70%;
}

h1{
  margin-top:15px;
  font-size:36px;
  font-weight:700;
  background:linear-gradient(90deg,#16327d,#3f82ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.subtitle{
  color:#6f7b95;
  font-size:14px;
  margin-top:6px;
}

.stats{
  display:flex;
  justify-content:space-around;
  padding:18px 10px;
  border-top:1px solid #edf0ff;
  border-bottom:1px solid #edf0ff;
}

.stat{
  text-align:center;
}

.stat h3{
  color:#2145bb;
  font-size:24px;
}

.stat p{
  font-size:11px;
  color:#6f7b95;
  margin-top:4px;
}

.join-wrap{
  padding:18px;
}

.join-btn{
  width:100%;
  border:none;
  border-radius:18px;
  padding:15px;
  background:linear-gradient(90deg,#1f9be0,#2478d5);
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
  font-size:17px;
  font-weight:600;
  cursor:pointer;
  box-shadow:0 10px 20px rgba(36,120,213,.25);
}

.telegram{
  font-size:24px;
}

.redirect{
  text-align:center;
  margin-top:14px;
  font-size:13px;
  color:#6f7b95;
}

.disclaimer{
  padding:14px;
  margin:0 18px 18px;
  background:#fff8e8;
  border:1px solid #ffd98a;
  border-radius:12px;
  font-size:11px;
  text-align:center;
  color:#7a5a00;
  line-height:1.5;
}

</style>
</head>

<body>

<div class="card">

  <div class="top">

    <div class="brand">JAI CLUB</div>

    <div class="logo">
      <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg">
    </div>

    <h1>JAI CLUB</h1>

    <div class="subtitle">
      Premium Match Analysis Platform
    </div>

  </div>

  <div class="stats">

    <div class="stat">
      <h3>25K+</h3>
      <p>TIPS</p>
    </div>

    <div class="stat">
      <h3>99%</h3>
      <p>ACCURACY</p>
    </div>

    <div class="stat">
      <h3>4.9★</h3>
      <p>RATING</p>
    </div>

  </div>

  <div class="join-wrap">

    <button class="join-btn"
      onclick="window.location.href='https://t.me/+98m0qu8KX-44ZDdl'">

      <span class="telegram">✈</span>
      Join Telegram

    </button>

    <div class="redirect">
      Auto redirect in <span id="count">3</span> sec...
    </div>

  </div>

  <div class="disclaimer">
    Analysis-based content only. No guarantees provided.
    Participate responsibly.
  </div>

</div>

<script>

let sec = 3;

let timer = setInterval(() => {

  sec--;

  document.getElementById("count").innerText = sec;

  if(sec <= 0){

    clearInterval(timer);

    window.location.href = "https://t.me/+98m0qu8KX-44ZDdl";
  }

},1000);

</script>

</body>
</html>
